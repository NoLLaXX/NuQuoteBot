name: Docker Build and Push

on:
  push:
    tags:
      - '*'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nuquotebot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on main branch
        run: |
          # Проверяем, содержится ли этот коммит в истории main ветки
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "❌ Tag is not on main branch. Skipping build."
            exit 1
          fi
          echo "✅ Tag is on main branch. Proceeding with build."

      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Bot/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Clean up old Docker Hub images
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Get authentication token
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"username\": \"${{ secrets.DOCKERHUB_USERNAME }}\", \"password\": \"$DOCKERHUB_TOKEN\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # Get list of all tags
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/nuquotebot"
          TAGS=$(curl -s -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${REPO}/tags/?page_size=100" \
            | jq -r '.results | sort_by(.last_updated) | reverse | .[].name')

          # Convert to array and skip 'latest' and the 3 most recent tags
          readarray -t TAG_ARRAY <<< "$TAGS"
          KEPT_COUNT=0
          
          for tag in "${TAG_ARRAY[@]}"; do
            # Skip 'latest' tag
            if [ "$tag" = "latest" ]; then
              continue
            fi
            
            # Keep first 3 non-latest tags
            if [ $KEPT_COUNT -lt 3 ]; then
              echo "Keeping tag: $tag"
              KEPT_COUNT=$((KEPT_COUNT + 1))
            else
              # Delete older tags
              echo "Deleting old tag: $tag"
              curl -s -X DELETE \
                -H "Authorization: JWT ${TOKEN}" \
                "https://hub.docker.com/v2/repositories/${REPO}/tags/${tag}/"
            fi
          done
