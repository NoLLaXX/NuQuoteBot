name: test

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore NuQuoteBot.sln

      - name: Build solution
        run: dotnet build NuQuoteBot.sln --configuration Release --no-restore

      - name: Check for test projects
        id: test_projects
        shell: bash
        run: |
          if find . \( -name "*.Tests.csproj" -o -name "*Tests.csproj" -o -name "*.Test.csproj" -o -name "*Test.csproj" \) | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.test_projects.outputs.found == 'true'
        run: dotnet test NuQuoteBot.sln --configuration Release --no-build

      - name: Skip tests
        if: steps.test_projects.outputs.found != 'true'
        run: echo "No test projects found. Skipping dotnet test."

      - name: Login to Gitea Registry
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          REGISTRY_HOST="${GITHUB_SERVER_URL#http://}"
          REGISTRY_HOST="${REGISTRY_HOST#https://}"
          echo "$GITHUB_TOKEN" | docker login "$REGISTRY_HOST" -u "$GITHUB_ACTOR" --password-stdin

      - name: Build Docker image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          REGISTRY_HOST="${GITHUB_SERVER_URL#http://}"
          REGISTRY_HOST="${REGISTRY_HOST#https://}"
          IMAGE="$REGISTRY_HOST/$GITHUB_REPOSITORY:latest"
          docker build -f Bot/Dockerfile -t "$IMAGE" .

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          REGISTRY_HOST="${GITHUB_SERVER_URL#http://}"
          REGISTRY_HOST="${REGISTRY_HOST#https://}"
          IMAGE="$REGISTRY_HOST/$GITHUB_REPOSITORY:latest"
          docker push "$IMAGE"
